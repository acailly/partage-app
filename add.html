<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partage Chateaubourg</title>

    <link href="https://unpkg.com/m-@1.6.0/dist/min.css" rel="stylesheet" />
    <script src="https://unpkg.com/m-@1.6.0/dist/min.js" defer></script>
  </head>
  <body class="bg-offwhite">
    <m-container maxwidth="md">
      <header class="flex flx-col justify-content-center pad-b-lg">
        <h1 class="txt-center pad-b-lg">Partage sur Châteaubourg</h1>
        <a href="index.html"> Revenir à la liste des objets </a>
      </header>

      <script>
        // @ts-check
        /**
         * @param {Event} [event]
         */
        async function onAdd(event){
          event?.preventDefault();

          const form = /** @type {HTMLFormElement | null} */ (event?.target)
          if (form) {
            const data = new FormData(form)
            const message = data.get("message")
            const email = data.get("email")

            // const apiURL = 'http://localhost:1337/api/proposition-prets'
            const apiURL = 'https://humble-dawn-687a03b4a9.strapiapp.com/api/proposition-prets'
            fetch(apiURL, 
              {
                method: 'POST',
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  data: {
                    email,
                    message
                  }
                })
              }
            ).then(async (response) => {
              if(!response.ok){
                const errorText = await response.text()
                throw new Error(`${response.status}-${errorText}`)
              }

              form.reset()
              alert(`Votre proposition est bien enregistrée, elle sera traitée et ajoutée aux propositions existantes prochainement`)
            })
            .catch(e => {
              alert(`Une erreur s'est produite (détails: ${e.toString()})`)
            })
          }
        }
      </script>

      <form onsubmit="onAdd(event)">
        <m-box ord="primary" class="pad-l-lg">
          <h2 class="pad-b-lg">De quels objets disposez vous ?</h2>

          <fieldset>
            <label>Saisissez les ici 👇</label>
            <textarea name="message" type="text" rows="5" class="pad-l-lg" placeholder="" required></textarea>
          </fieldset>

          <fieldset>
            <label>Adresse e-mail où vous contacter</label>
            <input name="email" type="email" required/>
            <small>
              Cette adresse sert uniquement à vous mettre en contact avec les
              autres utilisateurs du site. Votre adresse email ne sera ni
              divulguée publiquement, ni utilisée à des fins commerciaux
            </small>
          </fieldset>
          <button type="submit" ord="primary">Valider</button>
        </m-box>
      </form>
      <script>

      </script>
    </m-container>
  </body>
</html>
