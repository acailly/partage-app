<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partage Chateaubourg</title>

    <link href="https://unpkg.com/m-@1.6.0/dist/min.css" rel="stylesheet" />
    <script src="https://unpkg.com/m-@1.6.0/dist/min.js" defer></script>
  </head>
  <body class="bg-offwhite">
    <m-container maxwidth="md">
      <header class="flex flx-col justify-content-center pad-b-xl">
        <h1 class="txt-center">Partage sur Châteaubourg</h1>
        <a
          role="button"
          ord="primary"
          href="add.html"
          class="align-self-center"
        >
          Prêter mes objets
        </a>
      </header>
      
      <main>
        Chargement des données...
      </main>

      <script>
        const thisScript = document.currentScript

        // TODO ACY ajouter un champ sort order dans la catégorie
        fetch('https://humble-dawn-687a03b4a9.strapiapp.com/api/categorie-objets?populate=*&sort[0]=updatedAt')
          .then(response => response.json())
          .then(response => {
            const {data: objetsParCategorie} = response

            let html = "";

            objetsParCategorie.forEach((catégorie) => {
              html += `<section class="pad-all-md">`;
              html += `<h4>${catégorie.Nom} (${catégorie.objets.length} types d'objets)</h4>`;
              html += `<m-box ord="primary" class="pad-l-lg">`;

              let premièreColonne = true;
              catégorie.objets.forEach((objet) => {
                if (premièreColonne) {
                  html += `<m-row>`;
                }

                html += `<m-col>`;
                // TODO ACY ajouter un champ slug dans l'objet
                html += `<a href="ask.html?object=${objet.Nom}">${objet.Nom}</a>`;
                html += `</m-col>`;

                if (!premièreColonne) {
                  html += `</m-row>`;
                }

                premièreColonne = !premièreColonne;
              });

              html += `</m-box>`;
              html += `</section>`;
            });

            const main = document.querySelector("main");
            main.innerHTML = html;

            thisScript.remove();
          })
      </script>
    </m-container>
  </body>
</html>
